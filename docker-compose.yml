services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: vm_alignment_rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: SENPOS
      RABBITMQ_DEFAULT_PASS: SENPOS
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  coordinator:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    container_name: vm_alignment_coordinator
    ports:
      - "5000:5000"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./coordinator/coordinator_config.json:/app/coordinator/coordinator_config.json:ro
      - ./coordinator/state.json:/app/coordinator/state.json:rw
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
